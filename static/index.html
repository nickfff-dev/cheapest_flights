<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SkyProwl — Flight Hunter</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #070b14;
    --surface:    #0d1424;
    --surface2:   #131e36;
    --border:     #1e3050;
    --cyan:       #00e5ff;
    --cyan-dim:   #0a8fa8;
    --cyan-glow:  rgba(0,229,255,0.13);
    --amber:      #ffb300;
    --red:        #ff4060;
    --green:      #00e676;
    --text:       #ddeaff;
    --text-mid:   #8aaad0;
    --text-dim:   #5a7898;
    --text-bright:#f0f6ff;
    --mono:       'Share Tech Mono', monospace;
    --display:    'Chakra Petch', sans-serif;
    --radius:     4px;
    --tr:         160ms cubic-bezier(.4,0,.2,1);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--display);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,229,255,0.07) 0%, transparent 65%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(30,48,80,0.35) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(30,48,80,0.18) 40px);
  }

  /* ── Header ─────────────────────────────────────────────── */
  header {
    padding: 26px 24px 18px;
    display: flex;
    align-items: baseline;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0.35;
  }
  .logo {
    font-size: clamp(30px, 6vw, 44px);
    font-weight: 700;
    letter-spacing: -1px;
    color: var(--text-bright);
    line-height: 1;
  }
  .logo span { color: var(--cyan); }
  .tagline {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .status-bar {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-mid);
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.35} }

  /* ── Main ─────────────────────────────────────────────────── */
  main { max-width: 1120px; margin: 0 auto; padding: 32px 20px 80px; }

  /* ── Search panel ─────────────────────────────────────────── */
  .search-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 28px;
    margin-bottom: 36px;
    position: relative;
  }
  .search-panel::before {
    content: '';
    position: absolute;
    top: -1px; left: 20px; width: 90px; height: 2px;
    background: var(--cyan);
  }
  .panel-title {
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 24px;
    font-weight: 600;
  }

  .route-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 12px;
    align-items: end;
    margin-bottom: 20px;
  }
  .route-arrow {
    display: flex;
    align-items: center;
    justify-content: center;
    padding-bottom: 12px;
    color: var(--cyan-dim);
    font-size: 22px;
  }
  .options-row {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .field { display: flex; flex-direction: column; gap: 7px; }
  .field-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-mid);
    font-weight: 600;
  }
  .field-input {
    font-family: var(--mono);
    font-size: 15px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-bright);
    padding: 11px 13px;
    width: 100%;
    outline: none;
    transition: border-color var(--tr), box-shadow var(--tr);
    -webkit-appearance: none;
  }
  .field-input:focus {
    border-color: var(--cyan-dim);
    box-shadow: 0 0 0 3px var(--cyan-glow);
  }
  .field-input::placeholder { color: var(--text-dim); font-size: 13px; }
  .field-input option { background: var(--surface2); }
  .field-input.valid   { border-color: var(--green); }
  .field-input.invalid { border-color: var(--red); }
  .field-input.checking { border-color: var(--amber); animation: bpulse .9s ease infinite; }
  @keyframes bpulse { 0%,100%{border-color:var(--amber)}50%{border-color:rgba(255,179,0,0.2)} }

  .field-hint {
    font-family: var(--mono);
    font-size: 12px;
    min-height: 16px;
    color: var(--text-dim);
  }
  .field-hint.ok  { color: var(--green); }
  .field-hint.err { color: var(--red); }
  .field-hint.info{ color: var(--amber); }

  .submit-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .btn-search {
    font-family: var(--display);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--cyan);
    border: none;
    border-radius: var(--radius);
    padding: 13px 36px;
    cursor: pointer;
    transition: background var(--tr), transform var(--tr), box-shadow var(--tr);
    position: relative;
    overflow: hidden;
  }
  .btn-search:hover:not(:disabled) {
    background: #33ecff;
    box-shadow: 0 0 28px rgba(0,229,255,0.4);
    transform: translateY(-1px);
  }
  .btn-search:active { transform: translateY(0); }
  .btn-search:disabled {
    background: var(--border); color: var(--text-dim);
    cursor: not-allowed; transform: none; box-shadow: none;
  }
  .btn-search.loading { pointer-events: none; }
  .btn-search.loading::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    animation: shimmer 1s ease infinite;
  }
  @keyframes shimmer { 0%{transform:translateX(-100%)}100%{transform:translateX(100%)} }
  .search-meta { font-family: var(--mono); font-size: 13px; color: var(--text-mid); }

  /* ── Results ──────────────────────────────────────────────── */
  #results-section { display: none; }
  .results-header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap; margin-bottom: 20px;
  }
  .results-title { font-size: clamp(18px, 4vw, 24px); font-weight: 700; color: var(--text-bright); }
  .route-tag { color: var(--cyan); font-size: 0.65em; font-weight: 400; margin-left: 10px; font-family: var(--mono); }

  .btn-export {
    font-family: var(--display);
    font-size: 12px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
    color: var(--cyan); background: transparent;
    border: 1px solid var(--cyan-dim); border-radius: var(--radius);
    padding: 9px 22px; cursor: pointer; transition: all var(--tr);
    white-space: nowrap;
  }
  .btn-export:hover {
    background: var(--cyan-glow); border-color: var(--cyan);
    box-shadow: 0 0 14px rgba(0,229,255,0.2);
  }

  .stats-strip {
    display: flex; gap: 28px; flex-wrap: wrap; margin-bottom: 24px;
    padding: 16px 22px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius);
  }
  .stat { display: flex; flex-direction: column; gap: 3px; }
  .stat-value { font-family: var(--mono); font-size: 20px; color: var(--cyan); }
  .stat-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); }

  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
  .filter-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-right: 4px; }
  .filter-chip {
    font-family: var(--mono); font-size: 12px; padding: 6px 14px;
    border-radius: 100px; border: 1px solid var(--border);
    background: transparent; color: var(--text-mid); cursor: pointer; transition: all var(--tr);
  }
  .filter-chip:hover { border-color: var(--cyan-dim); color: var(--text); }
  .filter-chip.active { border-color: var(--cyan); color: var(--cyan); background: var(--cyan-glow); }

  /* ── Table ────────────────────────────────────────────────── */
  .table-wrap { overflow-x: auto; border-radius: 6px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  thead { background: var(--surface2); position: sticky; top: 0; z-index: 10; }
  th {
    font-family: var(--display); font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text-mid); font-weight: 600;
    padding: 13px 15px; text-align: left; white-space: nowrap;
    cursor: pointer; user-select: none; transition: color var(--tr);
    border-bottom: 1px solid var(--border);
  }
  th:hover { color: var(--text-bright); }
  th.sorted { color: var(--cyan); }
  th .sa { margin-left: 4px; opacity: 0.5; font-size: 9px; }
  th.sorted .sa { opacity: 1; }

  tbody tr { border-bottom: 1px solid rgba(30,48,80,0.7); transition: background var(--tr); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(0,229,255,0.035); }

  td {
    font-family: var(--mono); padding: 12px 15px;
    color: var(--text); white-space: nowrap; vertical-align: middle; font-size: 14px;
  }
  .td-airline { color: var(--text-bright); font-family: var(--display); font-size: 13px; }
  .td-price   { color: var(--cyan); font-size: 16px; font-weight: 700; }
  .td-price.hi { color: var(--text-mid); font-size: 14px; font-weight: 400; }
  .td-route   { color: var(--text-mid); font-size: 13px; }
  .td-route .arr { color: var(--cyan-dim); }

  .badge { display: inline-block; padding: 3px 9px; border-radius: 3px; font-size: 11px; letter-spacing: 0.5px; }
  .b-ns { background:rgba(0,230,118,0.12); color:var(--green); border:1px solid rgba(0,230,118,0.3); }
  .b-1  { background:rgba(255,179,0,0.10); color:var(--amber); border:1px solid rgba(255,179,0,0.25); }
  .b-2p { background:rgba(255,64,96,0.10); color:var(--red);   border:1px solid rgba(255,64,96,0.25); }

  .co2-pill { font-size: 11px; padding: 3px 7px; border-radius: 3px; }
  .c-lo { background:rgba(0,230,118,0.1); color:var(--green); }
  .c-mi { background:rgba(255,179,0,0.1); color:var(--amber); }
  .c-hi { background:rgba(255,64,96,0.1); color:var(--red);   }

  /* ── Expand / layover ─────────────────────────────────────── */
  tr.expandable { cursor: pointer; }
  .expand-icon {
    color: var(--cyan-dim); font-size: 9px; margin-right: 6px;
    display: inline-block; transition: transform .2s;
  }
  tr.expanded .expand-icon { transform: rotate(90deg); }

  .layover-row { display: none; }
  .layover-row.visible { display: table-row; }
  .layover-row > td {
    background: rgba(4,8,18,0.75);
    padding: 0;
    border-bottom: 1px solid var(--border);
  }

  /* ── Vertical timeline ────────────────────────────────────── */
  .tl-wrap {
    padding: 20px 24px 20px 32px;
    display: flex;
    flex-direction: column;
  }
  .tl-node {
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  .tl-dot-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
    width: 14px;
  }
  .tl-dot {
    width: 10px; height: 10px; border-radius: 50%;
    border: 2px solid var(--cyan);
    background: var(--bg);
    flex-shrink: 0;
    box-shadow: 0 0 7px rgba(0,229,255,0.4);
    margin-top: 4px;
  }
  .tl-dot.stop-dot  { border-color: var(--amber); box-shadow: 0 0 7px rgba(255,179,0,0.4); }
  .tl-dot.dest-dot  { border-color: var(--green); background: var(--green); box-shadow: 0 0 7px rgba(0,230,118,0.4); }

  .tl-seg-wrap {
    display: flex;
    align-items: stretch;
    min-height: 32px;
  }
  .tl-line {
    width: 1px;
    margin: 0 auto;
    flex-shrink: 0;
  }
  .tl-line.flight { border-left: 1px dashed var(--cyan-dim); }
  .tl-line.lay    { border-left: 1px dashed rgba(255,179,0,0.45); }

  .tl-seg-info {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    padding-left: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tl-seg-info.lay-info { color: rgba(255,179,0,0.5); font-size: 10px; letter-spacing: 1px; }

  .tl-content { padding-bottom: 6px; }
  .tl-code  { font-family: var(--mono); font-size: 17px; color: var(--text-bright); font-weight: 700; letter-spacing: 1px; }
  .tl-time  { font-family: var(--mono); font-size: 15px; color: var(--cyan); margin-left: 10px; }
  .tl-name  { font-size: 12px; color: var(--text-mid); margin-top: 3px; }
  .tl-layover-tag {
    display: inline-block; margin-top: 5px;
    font-family: var(--mono); font-size: 11px;
    color: var(--amber);
    background: rgba(255,179,0,0.08);
    border: 1px solid rgba(255,179,0,0.22);
    border-radius: 3px; padding: 2px 9px;
  }

  /* ── Loading overlay ──────────────────────────────────────── */
  #loading-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(7,11,20,0.88); backdrop-filter: blur(4px);
    z-index: 1000; flex-direction: column;
    align-items: center; justify-content: center; gap: 24px;
  }
  #loading-overlay.visible { display: flex; }
  .radar {
    width: 80px; height: 80px; border-radius: 50%;
    border: 1px solid var(--border); position: relative;
    animation: spin 2.5s linear infinite;
  }
  .radar::before {
    content: ''; position: absolute; inset: -1px; border-radius: 50%;
    border: 2px solid transparent; border-top-color: var(--cyan);
    animation: spin 1.6s linear infinite reverse;
  }
  .radar::after {
    content: ''; position: absolute; top:50%; left:50%;
    transform: translate(-50%,-50%);
    width: 7px; height: 7px; background: var(--cyan);
    border-radius: 50%; box-shadow: 0 0 14px var(--cyan);
  }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loading-text { font-family: var(--mono); font-size: 14px; color: var(--text-mid); letter-spacing: 2px; }
  .loading-sub  { font-family: var(--mono); font-size: 11px; color: var(--text-dim); letter-spacing: 1px; }

  /* ── Error / empty ────────────────────────────────────────── */
  .error-box, .empty-box {
    padding: 32px; border-radius: 6px; text-align: center;
    font-family: var(--mono); font-size: 14px;
  }
  .error-box { background:rgba(255,64,96,0.06); border:1px solid rgba(255,64,96,0.22); color:var(--red); }
  .empty-box  { background:var(--surface); border:1px dashed var(--border); color:var(--text-mid); }

  /* ── Mobile ───────────────────────────────────────────────── */
  @media (max-width: 640px) {
    header { flex-wrap: wrap; gap: 8px; }
    .status-bar { margin-left: 0; }
    .route-row { grid-template-columns: 1fr; gap: 8px; }
    .route-arrow { display: none; }
    .options-row { grid-template-columns: 1fr 1fr; }
    .search-panel { padding: 20px 16px; }
    main { padding: 20px 12px 60px; }
    td { font-size: 13px; padding: 10px 10px; }
    th { font-size: 10px; padding: 11px 10px; }
    .th-co2, .td-co2 { display: none; }
    .stats-strip { gap: 18px; padding: 13px 16px; }
    .stat-value { font-size: 18px; }
  }
  @media (max-width: 400px) { .options-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="radar"></div>
  <div class="loading-text" id="loading-msg">SCANNING THE SKIES</div>
  <div class="loading-sub">SEARCHING ROUTES</div>
</div>

<header>
  <div><h1 class="logo">Sky<span>Prowl</span></h1></div>
  <div class="tagline">Flight Hunter v1.0</div>
  <div class="status-bar"><div class="status-dot"></div><span>READY</span></div>
</header>

<main>
  <div class="search-panel">
    <div class="panel-title">▸ Route Search</div>

    <div class="route-row">
      <div class="field">
        <label class="field-label" for="origin">Origin</label>
        <input id="origin" class="field-input" type="text"
          placeholder="City or IATA code" autocomplete="off" spellcheck="false"/>
        <div class="field-hint" id="origin-hint"></div>
      </div>
      <div class="route-arrow">→</div>
      <div class="field">
        <label class="field-label" for="dest">Destination</label>
        <input id="dest" class="field-input" type="text"
          placeholder="City or IATA code" autocomplete="off" spellcheck="false"/>
        <div class="field-hint" id="dest-hint"></div>
      </div>
    </div>

    <div class="options-row">
      <div class="field">
        <label class="field-label" for="dep-date">Depart</label>
        <input id="dep-date" class="field-input" type="date"/>
        <div class="field-hint" id="dep-hint"></div>
      </div>
      <div class="field">
        <label class="field-label" for="ret-date">Return <span style="font-size:10px;color:var(--text-dim)">(opt.)</span></label>
        <input id="ret-date" class="field-input" type="date"/>
        <div class="field-hint" id="ret-hint"></div>
      </div>
      <div class="field">
        <label class="field-label" for="adults">Adults</label>
        <input id="adults" class="field-input" type="number" min="1" max="9" value="1"/>
        <div class="field-hint" id="adults-hint"></div>
      </div>
      <div class="field">
        <label class="field-label" for="cabin">Cabin</label>
        <select id="cabin" class="field-input">
          <option value="economy">Economy</option>
          <option value="premium_economy">Premium Economy</option>
          <option value="business">Business</option>
          <option value="first">First</option>
        </select>
        <div class="field-hint"></div>
      </div>
      <div class="field">
        <label class="field-label" for="sort">Sort</label>
        <select id="sort" class="field-input">
          <option value="cheapest">Cheapest</option>
          <option value="best">Best</option>
        </select>
        <div class="field-hint"></div>
      </div>
    </div>

    <div class="submit-row">
      <button id="btn-search" class="btn-search" disabled>Search Flights</button>
      <span class="search-meta" id="form-meta"></span>
    </div>
  </div>

  <!-- Results -->
  <div id="results-section">
    <div class="results-header">
      <div class="results-title">Results <span class="route-tag" id="route-label"></span></div>
      <button class="btn-export" onclick="downloadCsv()">↓ Export CSV</button>
    </div>
    <div class="stats-strip" id="stats-strip"></div>
    <div class="filter-bar">
      <span class="filter-label">Filter:</span>
      <button class="filter-chip active" data-filter="all"          onclick="applyFilter(this)">All</button>
      <button class="filter-chip"        data-filter="nonstop"      onclick="applyFilter(this)">Nonstop</button>
      <button class="filter-chip"        data-filter="with-carryOn" onclick="applyFilter(this)">Carry-on incl.</button>
    </div>
    <div id="results-container"></div>
  </div>
</main>

<script>
/* ── State ─────────────────────────────────────────────── */
const S = {
  originId: null, originName: null,
  destId:   null, destName:   null,
  flights: [], downloadKey: null,
  sortCol: 'price', sortDir: 1, filter: 'all',
};
const V = { origin: false, dest: false };

/* ── DOM ───────────────────────────────────────────────── */
const $id       = id => document.getElementById(id);
const originInp = $id('origin');
const destInp   = $id('dest');
const depDate   = $id('dep-date');
const retDate   = $id('ret-date');
const adultsInp = $id('adults');
const cabinSel  = $id('cabin');
const sortSel   = $id('sort');
const btnSearch = $id('btn-search');
const formMeta  = $id('form-meta');
const overlay   = $id('loading-overlay');
const loadMsg   = $id('loading-msg');

const today = new Date().toISOString().split('T')[0];
depDate.min = retDate.min = today;
depDate.value = today;

/* ── Field state helper ────────────────────────────────── */
function setFS(id, cls, msg) {
  const inp  = $id(id);
  const hint = $id(id + '-hint');
  inp.classList.remove('valid','invalid','checking');
  if (cls) inp.classList.add(cls);
  if (hint) {
    hint.className = 'field-hint' + ({valid:' ok', invalid:' err', checking:' info'}[cls]||'');
    hint.textContent = msg || '';
  }
}

/* ── Location validation — BLUR ONLY ───────────────────── */
async function validateLoc(fieldId, inputEl, key) {
  const q = inputEl.value.trim();
  if (!q) { setFS(fieldId,'',''); V[key]=false; updateBtn(); return; }
  setFS(fieldId,'checking','⟳ validating...');
  V[key]=false; updateBtn();
  try {
    const res  = await fetch(`/api/validate-location?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    if (!res.ok) {
      setFS(fieldId, 'invalid', '✗ ' + (data.detail||'Not found'));
    } else {
      setFS(fieldId, 'valid', data.type==='airport'
        ? `✓ Airport: ${data.location_name}` : `✓ City: ${data.location_name}`);
      if (key==='origin') { S.originId=data.location_id; S.originName=data.location_name; }
      else                { S.destId  =data.location_id; S.destName  =data.location_name; }
      V[key] = true;
    }
  } catch { setFS(fieldId,'invalid','✗ Network error'); }
  updateBtn();
}

originInp.addEventListener('blur', () => {
  if (originInp.value.trim()) validateLoc('origin', originInp, 'origin');
  else { setFS('origin','',''); V.origin=false; updateBtn(); }
});
destInp.addEventListener('blur', () => {
  if (destInp.value.trim()) validateLoc('dest', destInp, 'dest');
  else { setFS('dest','',''); V.dest=false; updateBtn(); }
});
/* Invalidate if user edits after validation */
originInp.addEventListener('input', () => { if(V.origin){V.origin=false; setFS('origin','',''); updateBtn();} });
destInp.addEventListener('input',   () => { if(V.dest)  {V.dest  =false; setFS('dest',  '',''); updateBtn();} });

/* ── Date ──────────────────────────────────────────────── */
depDate.addEventListener('change', () => {
  const h = $id('dep-hint');
  if (!depDate.value) { h.className='field-hint err'; h.textContent='✗ Required'; return; }
  h.className='field-hint'; h.textContent='';
  retDate.min = depDate.value;
  if (retDate.value && retDate.value < depDate.value) retDate.value='';
  updateBtn();
});
retDate.addEventListener('change', () => {
  const h = $id('ret-hint');
  if (retDate.value && retDate.value < depDate.value) {
    h.className='field-hint err'; h.textContent='✗ Must be after depart'; retDate.value='';
  } else { h.className='field-hint'; h.textContent=''; }
  updateBtn();
});

/* ── Adults ────────────────────────────────────────────── */
adultsInp.addEventListener('input', () => {
  const h = $id('adults-hint'), v = parseInt(adultsInp.value,10);
  if (isNaN(v)||v<1) {
    h.className='field-hint err'; h.textContent='✗ Min 1';
    adultsInp.classList.add('invalid'); adultsInp.classList.remove('valid');
  } else {
    h.className='field-hint'; h.textContent='';
    adultsInp.classList.remove('invalid'); adultsInp.classList.add('valid');
  }
  updateBtn();
});

function updateBtn() {
  const ok = V.origin && V.dest && depDate.value && parseInt(adultsInp.value,10)>=1;
  btnSearch.disabled = !ok;
  formMeta.textContent = ok
    ? `${retDate.value?'Round-trip':'One-way'} · ${cabinSel.value} · ${adultsInp.value} adult(s)` : '';
}

/* ── Search ────────────────────────────────────────────── */
btnSearch.addEventListener('click', doSearch);
async function doSearch() {
  const payload = {
    origin_id: S.originId, dest_id: S.destId,
    dep_date: depDate.value, ret_date: retDate.value||null,
    adults: parseInt(adultsInp.value,10),
    cabin: cabinSel.value, sort: sortSel.value,
  };
  loadMsg.textContent = 'SCANNING THE SKIES';
  overlay.classList.add('visible');
  btnSearch.classList.add('loading'); btnSearch.disabled=true;

  const msgs=['SCANNING THE SKIES','FETCHING FLIGHT DATA','PARSING RESULTS','SORTING BY PRICE'];
  let mi=0;
  const ticker = setInterval(()=>{ loadMsg.textContent=msgs[++mi%msgs.length]; },1900);

  try {
    const res  = await fetch('/api/search',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const data = await res.json();
    clearInterval(ticker); overlay.classList.remove('visible');
    if (!res.ok) showError(data.detail||'Search failed');
    else {
      S.flights=data.flights||[]; S.downloadKey=data.download_key;
      S.sortCol='price'; S.sortDir=1; S.filter='all';
      renderResults(S.originName,S.destName,depDate.value,retDate.value,retDate.value?'Round-trip':'One-way');
    }
  } catch(e) {
    clearInterval(ticker); overlay.classList.remove('visible');
    showError('Network error: '+e.message);
  } finally { btnSearch.classList.remove('loading'); updateBtn(); }
}

/* ── Render ────────────────────────────────────────────── */
function renderResults(oN,dN,dep,ret,trip) {
  $id('route-label').textContent=`${oN} → ${dN}  ·  ${dep}${ret?' → '+ret:''}  ·  ${trip}`;
  const sec=$id('results-section');
  sec.style.display='block';
  sec.scrollIntoView({behavior:'smooth',block:'start'});
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  document.querySelector('[data-filter="all"]').classList.add('active');
  renderStats(); renderTable();
}

function renderStats() {
  const strip=$id('stats-strip'), fs=filteredFlights();
  if (!fs.length) { strip.innerHTML='<span style="font-family:var(--mono);font-size:13px;color:var(--text-mid)">No flights found.</span>'; return; }
  const prices=fs.map(f=>priceNum(f.price)).filter(n=>isFinite(n));
  const minP=Math.min(...prices),maxP=Math.max(...prices);
  const ns=fs.filter(f=>(f.stops||'').toLowerCase()==='nonstop').length;
  const al=new Set(fs.map(f=>f.airline)).size;
  strip.innerHTML=`
    <div class="stat"><div class="stat-value">${fs.length}</div><div class="stat-label">Flights</div></div>
    <div class="stat"><div class="stat-value" style="color:var(--green)">$${minP}</div><div class="stat-label">Cheapest</div></div>
    <div class="stat"><div class="stat-value" style="color:var(--text-mid)">$${maxP}</div><div class="stat-label">Priciest</div></div>
    <div class="stat"><div class="stat-value">${ns}</div><div class="stat-label">Nonstop</div></div>
    <div class="stat"><div class="stat-value">${al}</div><div class="stat-label">Airlines</div></div>`;
}

function renderTable() {
  const c=document.getElementById('results-container'), flights=sortedFlights();
  if (!flights.length) { c.innerHTML='<div class="empty-box">No flights match the current filter.</div>'; return; }
  const minP=Math.min(...flights.map(f=>priceNum(f.price)).filter(n=>isFinite(n)));
  const ah=col=>`<span class="sa${S.sortCol===col?' sorted':''}">${S.sortCol===col?(S.sortDir===1?'↑':'↓'):'⇅'}</span>`;

  let html=`<div class="table-wrap"><table><thead><tr>
    <th onclick="sortBy('airline')">Airline ${ah('airline')}</th>
    <th onclick="sortBy('price')">Price ${ah('price')}</th>
    <th>Route</th>
    <th onclick="sortBy('departure_time')">Depart ${ah('departure_time')}</th>
    <th onclick="sortBy('arrival_time')">Arrive ${ah('arrival_time')}</th>
    <th onclick="sortBy('duration')">Duration ${ah('duration')}</th>
    <th onclick="sortBy('stops')">Stops ${ah('stops')}</th>
    <th class="th-co2" onclick="sortBy('co2_kg')">CO₂ ${ah('co2_kg')}</th>
    <th>Extras</th>
  </tr></thead><tbody>`;

  flights.forEach((f,i)=>{
    const pNum=priceNum(f.price), isCheap=pNum===minP;
    const hasLay=f.layover_stops&&f.layover_stops.length>0;
    const sl=(f.stops||'').toLowerCase();
    const badge=sl==='nonstop'
      ?`<span class="badge b-ns">NONSTOP</span>`
      :sl.includes('1')
        ?`<span class="badge b-1">${esc(f.stops)}</span>`
        :`<span class="badge b-2p">${esc(f.stops)}</span>`;
    let co2='—';
    if(f.co2_kg){const d=parseInt(f.co2_percent_diff||'0',10),c=d<-5?'c-lo':d>20?'c-hi':'c-mi';co2=`<span class="co2-pill ${c}">${f.co2_kg}kg ${d>0?'+':''}${d}%</span>`;}
    const extras=f.carry_on_excluded?'<span title="No overhead bin carry-on" style="font-size:13px">🚫👜</span>':'—';
    const pc=pNum>minP*2?'td-price hi':'td-price';
    const ei=hasLay?`<span class="expand-icon" id="ei-${i}">▶</span>`:'';

    html+=`<tr class="${hasLay?'expandable':''}" ${hasLay?`onclick="toggleRow(${i})"`:''}  id="frow-${i}">
      <td class="td-airline">${ei}${esc(f.airline)}</td>
      <td class="${pc}">${isCheap?'★ ':''}${esc(f.price)}</td>
      <td class="td-route">${esc(f.origin)}<span class="arr"> → </span>${esc(f.destination)}</td>
      <td>${esc(f.departure_time)}</td>
      <td>${esc(f.arrival_time)}</td>
      <td>${esc(f.duration)}</td>
      <td>${badge}</td>
      <td class="td-co2">${co2}</td>
      <td>${extras}</td>
    </tr>`;
    if(hasLay){
      html+=`<tr class="layover-row" id="lrow-${i}"><td colspan="9">${buildTimeline(f)}</td></tr>`;
    }
  });

  html+=`</tbody></table></div>`;
  c.innerHTML=html;
}

/* ── Vertical layover timeline ─────────────────────────── */
function buildTimeline(f) {
  const stops = f.layover_stops || [];
  let html = '<div class="tl-wrap">';

  const addNode = (dot, code, time, name, layoverDur) => {
    html += `<div class="tl-node">
      <div class="tl-dot-col"><div class="tl-dot ${dot}"></div></div>
      <div class="tl-content">
        <span class="tl-code">${esc(code)}</span>
        ${time ? `<span class="tl-time">${esc(time)}</span>` : ''}
        ${name ? `<div class="tl-name">${esc(name)}</div>` : ''}
        ${layoverDur ? `<div><span class="tl-layover-tag">Layover: ${esc(layoverDur)}</span></div>` : ''}
      </div>
    </div>`;
  };

  const addConnector = () => {
    html += `<div class="tl-seg-wrap">
      <div class="tl-dot-col"><div class="tl-line flight" style="height:28px"></div></div>
    </div>`;
  };

  addNode('', f.origin, f.departure_time, '', '');
  stops.forEach(s => {
    addConnector();
    addNode('stop-dot', s.airport_name || '', '', s.city || '', s.duration || '');
  });
  addConnector();
  addNode('dest-dot', f.destination, f.arrival_time, '', '');

  html += '</div>';
  return html;
}
function toggleRow(i) {
  const lr=$id(`lrow-${i}`), fr=$id(`frow-${i}`);
  if(!lr) return;
  lr.classList.toggle('visible');
  fr.classList.toggle('expanded');
}

/* ── Sort ──────────────────────────────────────────────── */
function sortBy(col) {
  S.sortDir = S.sortCol===col ? S.sortDir*-1 : 1;
  S.sortCol = col;
  renderTable();
}
function sortedFlights() {
  return filteredFlights().slice().sort((a,b)=>{
    const col=S.sortCol;
    let av=a[col]??'', bv=b[col]??'';
    if(col==='price')                      {av=priceNum(a.price);bv=priceNum(b.price);}
    else if(col==='co2_kg')                {av=parseFloat(av)||0;bv=parseFloat(bv)||0;}
    else if(col==='departure_time'||col==='arrival_time'){av=t2m(av);bv=t2m(bv);}
    return av<bv?-S.sortDir:av>bv?S.sortDir:0;
  });
}

/* ── Filter ────────────────────────────────────────────── */
function applyFilter(chip) {
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  chip.classList.add('active');
  S.filter=chip.dataset.filter;
  renderStats(); renderTable();
}
function filteredFlights() {
  let fs=S.flights;
  if(S.filter==='nonstop')      fs=fs.filter(f=>(f.stops||'').toLowerCase()==='nonstop');
  if(S.filter==='with-carryOn') fs=fs.filter(f=>!f.carry_on_excluded);
  return fs;
}

/* ── CSV download — direct browser navigation ──────────── */
function downloadCsv() {
  if (!S.downloadKey) return;
  const a = document.createElement('a');
  a.href   = `/api/download/${S.downloadKey}`;
  a.target = '_blank';
  a.click();
}

/* ── Error ─────────────────────────────────────────────── */
function showError(msg) {
  const s=$id('results-section');
  s.style.display='block';
  $id('stats-strip').innerHTML='';
  $id('results-container').innerHTML=`<div class="error-box">✗ ${esc(msg)}</div>`;
  s.scrollIntoView({behavior:'smooth'});
}

/* ── Helpers ───────────────────────────────────────────── */
function priceNum(p){const d=(p||'').replace(/[^\d.]/g,'');return d?parseFloat(d):Infinity;}
function t2m(t){const m=(t||'').match(/(\d+):(\d+)\s*(AM|PM)?/i);if(!m)return 0;let h=parseInt(m[1],10),mn=parseInt(m[2],10);if(m[3]){if(m[3].toUpperCase()==='PM'&&h<12)h+=12;if(m[3].toUpperCase()==='AM'&&h===12)h=0;}return h*60+mn;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
</body>
</html>
