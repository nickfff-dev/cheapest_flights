<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EuroScan — European Flight Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --bg:       #07090f;
  --bg2:      #0d1117;
  --bg3:      #131a24;
  --border:   #1e2d3d;
  --amber:    #f59e0b;
  --amber2:   #fbbf24;
  --amber-dim:#7c4f06;
  --green:    #10b981;
  --red:      #ef4444;
  --blue:     #3b82f6;
  --muted:    #4b5563;
  --text:     #e2e8f0;
  --text2:    #94a3b8;
  --text3:    #64748b;
  --mono:     'JetBrains Mono', monospace;
  --sans:     'Space Grotesk', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  overflow-x: hidden;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,.03) 2px, rgba(0,0,0,.03) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* ─── HEADER ──────────────────────────────────────────────── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 32px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-brand { display: flex; align-items: center; gap: 12px; }
.header-logo {
  font-family: var(--mono);
  font-size: 20px;
  font-weight: 700;
  color: var(--amber);
  letter-spacing: -0.5px;
}
.header-logo span { color: var(--text2); font-weight: 300; }
.header-sub {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 2px;
  text-transform: uppercase;
}
.header-status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
}
.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ─── LAYOUT ──────────────────────────────────────────────── */
.main { max-width: 1400px; margin: 0 auto; padding: 32px 24px; }

.setup-grid {
  display: grid;
  grid-template-columns: 340px 1fr;
  gap: 24px;
  align-items: start;
}
@media (max-width: 900px) { .setup-grid { grid-template-columns: 1fr; } }

/* ─── CARDS ───────────────────────────────────────────────── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px;
}
.card-title {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-title::before { content: '//'; color: var(--amber-dim); }

/* ─── FORM ELEMENTS ───────────────────────────────────────── */
.field { margin-bottom: 18px; }
.field label {
  display: block;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 6px;
}

input[type=text], input[type=date], select {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  padding: 9px 12px;
  outline: none;
  transition: border-color 0.15s;
}
input[type=text]:focus, input[type=date]:focus, select:focus { border-color: var(--amber); }
input.input-valid { border-color: var(--green); }
input.input-error { border-color: var(--red); }
select option { background: var(--bg3); }

.input-row { display: flex; gap: 8px; }
.input-row input { flex: 1; }

.slider-row { display: flex; align-items: center; gap: 10px; }
.slider-row input[type=range] { flex: 1; accent-color: var(--amber); }
.slider-row span {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--amber);
  min-width: 24px;
  text-align: right;
}

.valid-msg { font-family: var(--mono); font-size: 11px; color: var(--green); margin-top: 5px; }
.error-msg { font-family: var(--mono); font-size: 11px; color: var(--red);   margin-top: 5px; }

/* ─── BUTTONS ─────────────────────────────────────────────── */
button {
  cursor: pointer;
  border: none;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.5px;
  transition: all 0.15s;
}
button:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-primary { background: var(--amber); color: #000; padding: 10px 20px; }
.btn-primary:hover:not(:disabled) { background: var(--amber2); }
.btn-full { width: 100%; }

.btn-secondary {
  background: var(--bg3);
  color: var(--text2);
  border: 1px solid var(--border);
  padding: 8px 14px;
}
.btn-secondary:hover:not(:disabled) { border-color: var(--amber); color: var(--amber); }

.btn-stop {
  background: transparent;
  color: var(--red);
  border: 1px solid var(--red);
  padding: 7px 14px;
}
.btn-stop:hover { background: rgba(239,68,68,.1); }

.btn-resume {
  background: transparent;
  color: var(--green);
  border: 1px solid var(--green);
  padding: 7px 14px;
}
.btn-resume:hover { background: rgba(16,185,129,.1); }

.btn-download {
  background: transparent;
  color: var(--blue);
  border: 1px solid var(--blue);
  padding: 7px 14px;
  position: relative;
  min-width: 130px;
}
.btn-download:hover:not(:disabled) { background: rgba(59,130,246,.1); }
.btn-download.loading {
  color: var(--text3);
  border-color: var(--text3);
  cursor: wait;
}

.btn-xs {
  background: var(--bg3);
  color: var(--text3);
  border: 1px solid var(--border);
  padding: 4px 10px;
  font-size: 10px;
}
.btn-xs:hover { color: var(--text); border-color: var(--text3); }

/* ─── TASK SUMMARY BAR ────────────────────────────────────── */
.task-summary {
  display: flex;
  justify-content: space-between;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px 14px;
  margin-bottom: 16px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text2);
}
.task-summary strong { color: var(--amber); }

/* ─── AIRPORT SELECTION ───────────────────────────────────── */
.airport-select-header { margin-bottom: 14px; }
.count {
  font-family: var(--mono);
  font-size: 11px;
  background: var(--amber);
  color: #000;
  border-radius: 100px;
  padding: 1px 8px;
  font-weight: 700;
}
.airport-controls {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
}
.airport-search { flex: 1; min-width: 140px; }
.airport-controls select { flex: 0 0 160px; }

.airport-list {
  max-height: 600px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.country-group { margin-bottom: 4px; }
.country-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  user-select: none;
  font-size: 12px;
  font-weight: 600;
  transition: border-color 0.1s;
}
.country-header:hover { border-color: var(--amber-dim); }
.country-header input[type=checkbox] { accent-color: var(--amber); }
.country-count { margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--text3); }

.airport-chips { display: flex; flex-wrap: wrap; gap: 4px; padding: 6px 4px 6px 20px; }
.airport-chip {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 4px 8px;
  border-radius: 3px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.1s;
  background: var(--bg);
}
.airport-chip:hover { border-color: var(--amber-dim); }
.airport-chip.selected { border-color: var(--amber); background: rgba(245,158,11,.08); }
.chip-code { font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--amber); }
.chip-name { font-size: 10px; color: var(--text3); max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ─── PROGRESS VIEW ───────────────────────────────────────── */
.progress-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 12px;
}
.progress-title {
  font-family: var(--mono);
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 12px;
}
.progress-date { color: var(--amber); font-size: 13px; }
.progress-actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* ─── STATS ───────────────────────────────────────────────── */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 12px;
}
@media (max-width: 700px) { .stats-bar { grid-template-columns: repeat(3, 1fr); } }
.stat { background: var(--bg2); padding: 14px 16px; text-align: center; }
.stat-val { font-family: var(--mono); font-size: 22px; font-weight: 700; line-height: 1; margin-bottom: 4px; color: var(--text); }
.stat-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); }
.stat.s-ok   .stat-val { color: var(--green); }
.stat.s-err  .stat-val { color: var(--red); }
.stat.s-info .stat-val { color: var(--blue); }
.stat.s-hi   .stat-val { color: var(--amber); }

/* ─── PROGRESS BAR ────────────────────────────────────────── */
.progress-bar-wrap {
  position: relative;
  height: 6px;
  background: var(--bg3);
  border-radius: 3px;
  margin-bottom: 20px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--amber), var(--amber2));
  border-radius: 3px;
  transition: width 0.4s ease;
  position: relative;
}
.progress-bar-fill::after {
  content: '';
  position: absolute;
  right: 0; top: -2px;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--amber2);
  box-shadow: 0 0 8px var(--amber);
}

/* ─── TABLE CONTROLS ──────────────────────────────────────── */
.table-controls {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.filter-tabs { display: flex; gap: 4px; }
.filter-tab {
  background: var(--bg3);
  color: var(--text3);
  border: 1px solid var(--border);
  padding: 5px 12px;
  font-size: 11px;
  letter-spacing: 0.5px;
  border-radius: 3px;
}
.filter-tab:hover { color: var(--text); }
.filter-tab.active { background: var(--amber); color: #000; border-color: var(--amber); }
.table-search { width: 220px !important; padding: 5px 10px !important; font-size: 12px !important; }

/* ─── RESULTS TABLE ───────────────────────────────────────── */
.results-table-wrap {
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: auto;
  max-height: 620px;
}
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead th {
  background: var(--bg3);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text3);
  padding: 10px 14px;
  text-align: left;
  position: sticky;
  top: 0;
  border-bottom: 1px solid var(--border);
}
tbody tr { border-bottom: 1px solid rgba(30,45,61,.6); }
tbody tr:last-child { border-bottom: none; }
tbody tr.country-row { background: var(--bg3); }
tbody tr.country-row td {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text3);
  padding: 6px 14px;
}
tbody tr.airport-row:hover { background: rgba(245,158,11,.04); }
tbody tr.airport-row td { padding: 9px 14px; vertical-align: middle; }

.airport-code-cell { display: flex; align-items: center; gap: 8px; }
.airport-code-text { font-family: var(--mono); font-weight: 700; color: var(--amber); font-size: 13px; }
.airport-name-small { color: var(--text3); font-size: 11px; }

/* ─── STATUS BADGES ───────────────────────────────────────── */
.badge {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 2px;
  letter-spacing: 0.5px;
  display: inline-block;
}
.badge-pending   { background: rgba(100,116,139,.15); color: var(--muted); border: 1px solid rgba(100,116,139,.3); }
.badge-running   { background: rgba(59,130,246,.15);  color: var(--blue);  border: 1px solid rgba(59,130,246,.4); animation: blink 1.5s infinite; }
.badge-completed { background: rgba(16,185,129,.12);  color: var(--green); border: 1px solid rgba(16,185,129,.3); }
.badge-failed    { background: rgba(239,68,68,.12);   color: var(--red);   border: 1px solid rgba(239,68,68,.3); }
.badge-stopped   { background: rgba(245,158,11,.12);  color: var(--amber); border: 1px solid rgba(245,158,11,.3); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }

.flights-count { color: var(--amber); font-family: var(--mono); font-weight: 700; }

/* ─── EXPORT TOAST ────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 18px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 1000;
  box-shadow: 0 4px 24px rgba(0,0,0,.5);
  animation: slideUp 0.2s ease;
}
.toast-spinner {
  width: 14px; height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}
.toast-done { color: var(--green); font-size: 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

/* ─── LOADING / EMPTY ─────────────────────────────────────── */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 60vh;
  font-family: var(--mono);
  color: var(--text3);
  letter-spacing: 2px;
}
.loading::before { content: '▶ '; color: var(--amber); animation: blink 1s infinite; }
.empty-state { padding: 40px; text-align: center; font-family: var(--mono); color: var(--text3); font-size: 12px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const FLAGS = {
  'UK':'🇬🇧','France':'🇫🇷','Germany':'🇩🇪','Italy':'🇮🇹','Spain':'🇪🇸',
  'Netherlands':'🇳🇱','Belgium':'🇧🇪','Switzerland':'🇨🇭','Austria':'🇦🇹',
  'Portugal':'🇵🇹','Greece':'🇬🇷','Denmark':'🇩🇰','Sweden':'🇸🇪','Norway':'🇳🇴',
  'Finland':'🇫🇮','Poland':'🇵🇱','Czech Republic':'🇨🇿','Hungary':'🇭🇺',
  'Romania':'🇷🇴','Bulgaria':'🇧🇬','Croatia':'🇭🇷','Serbia':'🇷🇸',
  'Slovakia':'🇸🇰','Slovenia':'🇸🇮','Estonia':'🇪🇪','Latvia':'🇱🇻',
  'Lithuania':'🇱🇹','Luxembourg':'🇱🇺','Malta':'🇲🇹','Cyprus':'🇨🇾',
  'Ireland':'🇮🇪','Iceland':'🇮🇸','Turkey':'🇹🇷','Albania':'🇦🇱',
  'North Macedonia':'🇲🇰','Bosnia':'🇧🇦','Montenegro':'🇲🇪','Kosovo':'🏳️',
  'Moldova':'🇲🇩','Georgia':'🇬🇪','Armenia':'🇦🇲','Azerbaijan':'🇦🇿',
};

function StatusBadge({ status }) {
  const map = {
    pending:   ['badge-pending',   '◌ PENDING'],
    running:   ['badge-running',   '▶ RUNNING'],
    completed: ['badge-completed', '✓ DONE'],
    failed:    ['badge-failed',    '✗ FAILED'],
    stopped:   ['badge-stopped',   '⏸ STOPPED'],
  };
  const [cls, label] = map[status] || ['badge-pending', status];
  return <span className={`badge ${cls}`}>{label}</span>;
}

// ─── EXPORT TOAST ─────────────────────────────────────────────────────────────
function ExportToast({ state }) {
  if (!state) return null;
  return (
    <div className="toast">
      <span className="toast-done">✓</span> Download started!
    </div>
  );
}

// ─── SETUP FORM ──────────────────────────────────────────────────────────────
function SetupForm({ airports, onStart }) {
  const [origin, setOrigin]         = useState('');
  const [validated, setValidated]   = useState(null);
  const [validating, setValidating] = useState(false);
  const [validError, setValidError] = useState('');
  const [date, setDate]             = useState('');
  const [maxWorkers, setMaxWorkers] = useState(10);
  const [selected, setSelected]     = useState(() => new Set(airports.map(a => a.code)));
  const [airportQ, setAirportQ]     = useState('');
  const [countryF, setCountryF]     = useState('all');
  const [starting, setStarting]     = useState(false);

  const countries = [...new Set(airports.map(a => a.country))].sort();

  const filteredAirports = airports.filter(a => {
    if (countryF !== 'all' && a.country !== countryF) return false;
    if (airportQ) {
      const q = airportQ.toUpperCase();
      return a.code.includes(q) || a.name.toUpperCase().includes(q);
    }
    return true;
  });

  const validate = async () => {
    if (!origin.trim()) return;
    setValidating(true); setValidError(''); setValidated(null);
    try {
      const res  = await fetch(`/api/validate-origin?q=${encodeURIComponent(origin.trim())}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Unknown error');
      setValidated(data);
    } catch (e) { setValidError(e.message); }
    setValidating(false);
  };

  const toggleAirport = code => setSelected(prev => {
    const next = new Set(prev);
    next.has(code) ? next.delete(code) : next.add(code);
    return next;
  });

  const toggleCountry = country => {
    const codes  = airports.filter(a => a.country === country).map(a => a.code);
    const allSel = codes.every(c => selected.has(c));
    setSelected(prev => {
      const next = new Set(prev);
      if (allSel) codes.forEach(c => next.delete(c));
      else        codes.forEach(c => next.add(c));
      return next;
    });
  };

  const handleStart = async () => {
    if (!validated || !date || selected.size === 0) return;
    setStarting(true);
    await onStart({
      origin_id:         validated.origin_id,
      origin_name:       validated.origin_name,
      dep_date:          date,
      max_workers:       maxWorkers,
      selected_airports: [...selected],
    });
    setStarting(false);
  };

  const today = new Date().toISOString().split('T')[0];

  return (
    <div className="setup-grid">
      {/* ── Left: config ── */}
      <div className="card">
        <div className="card-title">Search Config</div>

        <div className="field">
          <label>Origin — city name or IATA code</label>
          <div className="input-row">
            <input
              type="text"
              value={origin}
              onChange={e => { setOrigin(e.target.value); setValidated(null); setValidError(''); }}
              onKeyDown={e => e.key === 'Enter' && validate()}
              placeholder="London  ·  LHR  ·  Paris"
              className={validated ? 'input-valid' : validError ? 'input-error' : ''}
            />
            <button className="btn-secondary" onClick={validate} disabled={validating || !origin.trim()}>
              {validating ? '···' : 'CHECK'}
            </button>
          </div>
          {validated  && <div className="valid-msg">✓ {validated.origin_name} ({validated.type})</div>}
          {validError && <div className="error-msg">✗ {validError}</div>}
        </div>

        <div className="field">
          <label>Departure Date</label>
          <input type="date" value={date} min={today} onChange={e => setDate(e.target.value)} />
        </div>

        <div className="field">
          <label>Workers</label>
          <div className="slider-row">
            <input type="range" min={1} max={30} value={maxWorkers}
              onChange={e => setMaxWorkers(Number(e.target.value))} />
            <span>{maxWorkers}</span>
          </div>
        </div>

        <div className="task-summary">
          <span>Destinations: <strong>{selected.size}</strong></span>
          <span>Requests: <strong>{selected.size}</strong></span>
          <span>Workers: <strong>{maxWorkers}</strong></span>
        </div>

        <button
          className="btn-primary btn-full"
          onClick={handleStart}
          disabled={!validated || !date || selected.size === 0 || starting}
        >
          {starting ? 'LAUNCHING...' : `▶ SCAN ${selected.size} AIRPORTS`}
        </button>
      </div>

      {/* ── Right: airport selector ── */}
      <div className="card">
        <div className="airport-select-header">
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'10px'}}>
            <div className="card-title" style={{marginBottom:0}}>Destinations</div>
            <span className="count">{selected.size} / {airports.length}</span>
          </div>
          <div className="airport-controls">
            <input
              type="text"
              className="airport-search"
              placeholder="Search code or city…"
              value={airportQ}
              onChange={e => setAirportQ(e.target.value)}
            />
            <select value={countryF} onChange={e => setCountryF(e.target.value)}>
              <option value="all">All countries</option>
              {countries.map(c => (
                <option key={c} value={c}>{FLAGS[c] || ''} {c}</option>
              ))}
            </select>
            <button className="btn-xs" onClick={() => setSelected(new Set(airports.map(a => a.code)))}>ALL</button>
            <button className="btn-xs" onClick={() => setSelected(new Set())}>NONE</button>
          </div>
        </div>

        <div className="airport-list">
          {countries
            .filter(c => countryF === 'all' || c === countryF)
            .map(country => {
              const grp    = filteredAirports.filter(a => a.country === country);
              if (!grp.length) return null;
              const selCnt = grp.filter(a => selected.has(a.code)).length;
              const allSel = selCnt === grp.length;
              return (
                <div key={country} className="country-group">
                  <div className="country-header" onClick={() => toggleCountry(country)}>
                    <input
                      type="checkbox"
                      checked={allSel}
                      onChange={() => toggleCountry(country)}
                      onClick={e => e.stopPropagation()}
                    />
                    <span>{FLAGS[country] || '🌍'} {country}</span>
                    <span className="country-count">{selCnt}/{grp.length}</span>
                  </div>
                  <div className="airport-chips">
                    {grp.map(a => (
                      <div
                        key={a.code}
                        className={`airport-chip ${selected.has(a.code) ? 'selected' : ''}`}
                        onClick={() => toggleAirport(a.code)}
                      >
                        <span className="chip-code">{a.code}</span>
                        <span className="chip-name">{a.name}</span>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
        </div>
      </div>
    </div>
  );
}

// ─── PROGRESS VIEW ────────────────────────────────────────────────────────────
function ProgressView({ taskId, onNewTask }) {
  const [task, setTask]         = useState(null);
  const [airports, setAirports] = useState([]);
  const [filter, setFilter]     = useState('all');
  const [search, setSearch]     = useState('');
  const [exportState, setExportState] = useState(null); // null | 'loading' | 'done'
  const pollRef                 = useRef(null);
  const exportTimerRef          = useRef(null);

  const fetchStatus = useCallback(async () => {
    try {
      const res  = await fetch(`/api/tasks/${taskId}`);
      const data = await res.json();
      setTask(data);
      if (data.status === 'completed' || data.status === 'failed') {
        clearInterval(pollRef.current);
      }
    } catch (_) {}
  }, [taskId]);

  useEffect(() => {
    fetch('/api/airports').then(r => r.json()).then(setAirports).catch(() => {});
    fetchStatus();
    pollRef.current = setInterval(fetchStatus, 2000);
    return () => { clearInterval(pollRef.current); clearTimeout(exportTimerRef.current); };
  }, [fetchStatus]);

  const stop = async () => {
    await fetch(`/api/tasks/${taskId}/stop`, { method: 'POST' });
    fetchStatus();
  };

  const resume = async () => {
    await fetch(`/api/tasks/${taskId}/resume`, { method: 'POST' });
    clearInterval(pollRef.current);
    pollRef.current = setInterval(fetchStatus, 2000);
    fetchStatus();
  };

  const download = () => {
    // Direct navigation — browser download dialog opens immediately as bytes
    // arrive, no fetch buffering delay behind nginx.
    const a = document.createElement('a');
    a.href   = `/api/tasks/${taskId}/download`;
    a.target = '_blank';
    a.click();
    setExportState('done');
    exportTimerRef.current = setTimeout(() => setExportState(null), 2500);
  };

  if (!task) return <div className="loading">CONNECTING TO TASK</div>;

  const pct        = task.total_jobs > 0 ? Math.round((task.completed_jobs / task.total_jobs) * 100) : 0;
  const airportMap = Object.fromEntries(airports.map(a => [a.code, a]));

  // Flat rows — airport_summary is now {status, flights, error} per code
  const rows = Object.entries(task.airport_summary || {}).map(([code, info]) => ({
    code,
    name:    airportMap[code]?.name    || code,
    country: airportMap[code]?.country || '?',
    status:  info.status,
    flights: info.flights,
    error:   info.error,
  }));

  const filtered = rows.filter(r => {
    if (filter !== 'all' && r.status !== filter) return false;
    if (search) {
      const s = search.toUpperCase();
      if (!r.code.includes(s) && !r.name.toUpperCase().includes(s) && !r.country.toUpperCase().includes(s))
        return false;
    }
    return true;
  });

  const byCountry = {};
  filtered.forEach(r => {
    if (!byCountry[r.country]) byCountry[r.country] = [];
    byCountry[r.country].push(r);
  });

  const filterCounts = {
    all:       rows.length,
    pending:   rows.filter(r => r.status === 'pending').length,
    running:   rows.filter(r => r.status === 'running').length,
    completed: rows.filter(r => r.status === 'completed').length,
    failed:    rows.filter(r => r.status === 'failed').length,
  };

  return (
    <div>
      {/* Header */}
      <div className="progress-header">
        <div className="progress-title">
          ✈ {task.origin_name}
          <span style={{color:'var(--text3)'}}>→ EUROPE</span>
          <span className="progress-date">{task.dep_date}</span>
          <StatusBadge status={task.status} />
        </div>
        <div className="progress-actions">
          {task.status === 'running' && <button className="btn-stop"   onClick={stop}>⏸ PAUSE</button>}
          {task.status === 'stopped' && <button className="btn-resume" onClick={resume}>▶ RESUME</button>}
          <button className="btn-download" onClick={download}>
            ⬇ EXPORT JSON
          </button>
          <button className="btn-secondary" onClick={onNewTask}>+ NEW SCAN</button>
        </div>
      </div>

      {/* Stats */}
      <div className="stats-bar">
        <div className="stat">
          <div className="stat-val">{task.total_jobs}</div>
          <div className="stat-label">Airports</div>
        </div>
        <div className="stat s-ok">
          <div className="stat-val">{task.completed_jobs}</div>
          <div className="stat-label">Completed</div>
        </div>
        <div className="stat s-err">
          <div className="stat-val">{task.failed_jobs}</div>
          <div className="stat-label">Failed</div>
        </div>
        <div className="stat s-info">
          <div className="stat-val">{task.running_jobs}</div>
          <div className="stat-label">Running</div>
        </div>
        <div className="stat s-hi">
          <div className="stat-val">{task.total_flights.toLocaleString()}</div>
          <div className="stat-label">Flights Found</div>
        </div>
        <div className="stat">
          <div className="stat-val" style={{fontSize:'14px'}}>{pct}%</div>
          <div className="stat-label">Progress</div>
        </div>
      </div>

      {/* Progress bar */}
      <div className="progress-bar-wrap">
        <div className="progress-bar-fill" style={{width:`${pct}%`}} />
      </div>

      {/* Table controls */}
      <div className="table-controls">
        <div className="filter-tabs">
          {['all','pending','running','completed','failed'].map(f => (
            <button
              key={f}
              className={`filter-tab ${filter === f ? 'active' : ''}`}
              onClick={() => setFilter(f)}
            >
              {f.toUpperCase()} {filterCounts[f] > 0 && <span style={{opacity:.6}}>({filterCounts[f]})</span>}
            </button>
          ))}
        </div>
        <input
          type="text"
          className="table-search"
          placeholder="Search airports…"
          value={search}
          onChange={e => setSearch(e.target.value)}
        />
      </div>

      {/* Table */}
      <div className="results-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Airport</th>
              <th>Country</th>
              <th>Status</th>
              <th>Flights Found</th>
              <th>Error</th>
            </tr>
          </thead>
          <tbody>
            {Object.entries(byCountry).sort(([a],[b]) => a.localeCompare(b)).map(([country, crows]) => (
              <React.Fragment key={country}>
                <tr className="country-row">
                  <td colSpan={5}>
                    {FLAGS[country] || '🌍'} {country} — {crows.length} airport{crows.length !== 1 ? 's' : ''}
                  </td>
                </tr>
                {crows.map(r => (
                  <tr key={r.code} className="airport-row">
                    <td>
                      <div className="airport-code-cell">
                        <span className="airport-code-text">{r.code}</span>
                        <span className="airport-name-small">{r.name}</span>
                      </div>
                    </td>
                    <td style={{color:'var(--text3)', fontSize:'11px'}}>
                      {FLAGS[r.country] || ''} {r.country}
                    </td>
                    <td><StatusBadge status={r.status} /></td>
                    <td>
                      {r.flights > 0
                        ? <span className="flights-count">{r.flights}</span>
                        : <span style={{color:'var(--text3)'}}>—</span>}
                    </td>
                    <td style={{fontFamily:'var(--mono)', fontSize:'10px', color:'var(--red)', maxWidth:'260px', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                      {r.error || ''}
                    </td>
                  </tr>
                ))}
              </React.Fragment>
            ))}
            {filtered.length === 0 && (
              <tr>
                <td colSpan={5} className="empty-state">No airports match this filter</td>
              </tr>
            )}
          </tbody>
        </table>
      </div>

      <ExportToast state={exportState} />
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [phase, setPhase]       = useState('setup');
  const [taskId, setTaskId]     = useState(null);
  const [airports, setAirports] = useState([]);

  useEffect(() => {
    fetch('/api/airports').then(r => r.json()).then(setAirports).catch(() => {});
  }, []);

  const handleStart = async config => {
    const res  = await fetch('/api/tasks', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(config),
    });
    const data = await res.json();
    setTaskId(data.task_id);
    setPhase('progress');
  };

  if (!airports.length) return <div className="loading">LOADING AIRPORTS</div>;

  return (
    <>
      <header className="header">
        <div className="header-brand">
          <div>
            <div className="header-logo">EURO<span>SCAN</span></div>
            <div className="header-sub">European Flight Scanner</div>
          </div>
        </div>
        <div className="header-status">
          <div className="status-dot" />
          SYSTEM ONLINE · {airports.length} AIRPORTS LOADED
        </div>
      </header>

      <main className="main">
        {phase === 'setup' && (
          <SetupForm airports={airports} onStart={handleStart} />
        )}
        {phase === 'progress' && taskId && (
          <ProgressView taskId={taskId} onNewTask={() => setPhase('setup')} />
        )}
      </main>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
